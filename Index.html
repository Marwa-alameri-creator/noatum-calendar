<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Posts Calendar 2026 — Noatum Maritime</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#2E3955;--teal:#13C5BD;--light:#CFD0CC;--white:#FFFFFF;
  --navy2:#1A2235;--navy3:#3D4F6E;--teal2:#0fa89f;--teal-light:#e6fafa;
  --bg:#f0f2f5;--muted:#6b7a99;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--navy);font-size:13px;min-height:100vh}

/* ── TOP HEADER ── */
.topbar{background:var(--navy);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:36px;height:36px;object-fit:contain;border-radius:4px;background:#fff;padding:2px}
.topbar-title{color:#fff;font-size:16px;font-weight:700;letter-spacing:.2px}
.topbar-sub{color:var(--teal);font-size:11px;margin-top:1px}
.topbar-badge{background:rgba(19,197,189,.15);color:var(--teal);font-size:11px;padding:5px 14px;border-radius:20px;font-weight:600;border:1px solid rgba(19,197,189,.3)}

/* ── MAIN WRAP ── */
.main{max-width:1200px;margin:0 auto;padding:24px 24px 40px}

/* ── SUMMARY CARDS ── */
.cal-summary{display:grid;grid-template-columns:1.2fr 20px repeat(7,1fr);gap:10px;margin-bottom:20px}
.cs-card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:3px solid;cursor:pointer;transition:all .18s;user-select:none}
.cs-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.cs-card.dimmed{opacity:.35}
.cs-count{font-size:20px;font-weight:700}
.cs-label{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500}
.cs-total{background:var(--navy) !important;border-top-color:var(--teal) !important}
.cs-total .cs-count{color:#fff !important;font-size:26px}
.cs-total .cs-label{color:rgba(255,255,255,.7) !important}

/* ── FILTER BAR ── */
.filter-bar{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.cf-btn{padding:6px 16px;border-radius:20px;border:1.5px solid #d4d8e2;background:#fff;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
.cf-btn:hover{border-color:var(--teal);color:var(--teal)}
.cf-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.cf-btn.cf-all.active{background:var(--teal);border-color:var(--teal);color:#fff}
.filter-reset{margin-left:auto;padding:6px 16px;border-radius:8px;border:1px solid var(--teal);background:transparent;color:var(--teal);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.filter-reset:hover{background:var(--teal);color:#fff}

/* ── CALENDAR WRAPPER ── */
.cal-wrap{background:#fff;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.08);overflow:hidden;margin-bottom:18px}
.cal-nav-row{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0f2f5}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-nav-btn{width:34px;height:34px;border-radius:8px;border:1px solid #d4d8e2;background:#fff;cursor:pointer;font-size:18px;color:var(--navy);display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.cal-nav-btn:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
.cal-month-label{font-size:17px;font-weight:700;color:var(--navy);min-width:180px;text-align:center}
.cal-jump-btn{padding:6px 16px;border-radius:8px;border:1px solid #d4d8e2;background:#fff;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.cal-jump-btn:hover{border-color:var(--teal);color:var(--teal)}
.cal-post-count{font-size:11px;color:var(--muted)}

/* ── DOW ROW ── */
.cal-dow-row{display:grid;grid-template-columns:1.2fr 20px repeat(7,1fr);background:var(--navy)}
.cal-dow{padding:11px 0;text-align:center;color:rgba(255,255,255,.6);font-size:11px;font-weight:600;letter-spacing:.5px}
.cal-dow:first-child,.cal-dow:last-child{color:var(--teal)}

/* ── DAY CELLS ── */
.cal-days{display:grid;grid-template-columns:1.2fr 20px repeat(7,1fr)}
.cal-day{min-height:100px;border-right:1px solid #f0f2f5;border-bottom:1px solid #f0f2f5;padding:7px 8px;background:#fff;transition:background .1s;vertical-align:top}
.cal-day:nth-child(7n){border-right:none}
.cal-day:hover{background:#f8fdfd}
.cal-day.other-month{background:#f8f9fb}
.cal-day.other-month .cal-day-num{color:#ccc}
.cal-day.has-posts{background:#f5fbfb}
.cal-day-num{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:5px;line-height:1;display:flex;align-items:center}
.cal-day-num.is-today{width:22px;height:22px;background:var(--teal);color:#fff;border-radius:50%;justify-content:center;font-size:11px}
.cal-day.other-month .cal-day-num{font-weight:400}

/* ── POST CHIPS ── */
.post-chip{border-radius:5px;padding:3px 7px;margin-bottom:3px;font-size:9.5px;font-weight:600;line-height:1.35;cursor:default;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative}
.post-chip:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:0;background:var(--navy);color:#fff;font-size:10px;padding:4px 8px;border-radius:6px;white-space:nowrap;z-index:999;font-weight:400;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.2)}

.c-UAE{background:#fff0e0;color:#a04800}
.c-China{background:#fdeaea;color:#9a0000}
.c-Spain{background:#fff8e0;color:#8a5a00}
.c-Turkey{background:#f2e8ff;color:#5500aa}
.c-India{background:#fff3e0;color:#b84800}
.c-Pakistan{background:#e8faf0;color:#0d6e35}
.c-All{background:#e4fafa;color:#087a76}

/* ── LEGEND ── */
.legend{background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.leg-title{font-size:11px;font-weight:700;color:var(--navy);margin-right:4px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:500}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* ── NO POSTS MSG ── */
.no-posts{text-align:center;padding:40px;color:var(--muted);font-size:13px}
</style>
</head>

  {name:"Zayed Humanitarian Day",    date:"2026-03-19",country:"UAE"},
  {name:"Islamic New Year",          date:"2026-06-17",country:"UAE"},
  {name:"Prophet Muhammad's B-Day",  date:"2026-08-26",country:"UAE"},
  {name:"Independence Day",          date:"2026-08-15",country:"India"},
  {name:"Diwali",                    date:"2026-11-08",country:"India"},
  {name:"Republic Day",              date:"2026-01-26",country:"India"},
  {name:"Independence Day",          date:"2026-08-14",country:"Pakistan"},
  {name:"Pakistan Day",              date:"2026-03-23",country:"Pakistan"},
  {name:"Labour Day",                date:"2026-05-01",country:"Pakistan"},
];

const COUNTRIES = ['UAE','China','Spain','Turkey','India','Pakistan','All'];
const BORDER_COLORS = {UAE:'#ff9a3c',China:'#e04444',Spain:'#f0a500',Turkey:'#9b30ff',India:'#e07800',Pakistan:'#1aaa55',All:'#13C5BD'};
const CHIP_CLASS = {UAE:'c-UAE',China:'c-China',Spain:'c-Spain',Turkey:'c-Turkey',India:'c-India',Pakistan:'c-Pakistan',All:'c-All'};
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

let calYear = 2026, calMonth = 0;
let activeCountries = new Set(COUNTRIES);

function filteredPosts(){
  return POSTS.filter(p => activeCountries.has(p.country));
}

// ── SUMMARY CARDS ────────────────────────────────────────────────
function renderSummary(){
  const countryCards = COUNTRIES.map(c => {
    const total = POSTS.filter(p => p.country === c).length;
    const active = activeCountries.has(c);
    return `<div class="cs-card ${active?'':'dimmed'}" style="border-top-color:${BORDER_COLORS[c]}" onclick="toggleCountry('${c}')">
      <div class="cs-count" style="color:${BORDER_COLORS[c]}">${total}</div>
      <div class="cs-label">${c === 'All' ? 'All Regions' : c}</div>
    </div>`;
  }).join('');
  const filteredTotal = filteredPosts().length;
  const spacer = `<div></div>`;
  const totalCard = `<div class="cs-card cs-total" style="border-top-color:#2E3955">
    <div class="cs-count" style="color:#2E3955">${filteredTotal}</div>
    <div class="cs-label" style="font-weight:700">Total Posts</div>
    <div style="font-size:9px;color:#13C5BD;margin-top:3px;font-weight:600">${activeCountries.size === COUNTRIES.length ? 'All countries' : activeCountries.size + ' countr' + (activeCountries.size===1?'y':'ies') + ' selected'}</div>
  </div>`;
  document.getElementById('cal-summary').innerHTML = totalCard + spacer + countryCards;
}

// ── FILTER PILLS ─────────────────────────────────────────────────
function renderFilters(){
  const allActive = activeCountries.size === COUNTRIES.length;
  let html = `<button class="cf-btn cf-all ${allActive?'active':''}" onclick="toggleAll()">All Countries</button>`;
  html += COUNTRIES.map(c => {
    const label = c === 'All' ? 'All Regions' : c;
    const active = activeCountries.has(c);
    return `<button class="cf-btn ${active?'active':''}" onclick="toggleCountry('${c}')" style="${active?'background:'+BORDER_COLORS[c]+';border-color:'+BORDER_COLORS[c]:''}">
      ${label}
    </button>`;
  }).join('');
  document.getElementById('country-filters').innerHTML = html;
}

// ── TOGGLE ───────────────────────────────────────────────────────
function toggleAll(){
  if(activeCountries.size === COUNTRIES.length) activeCountries.clear();
  else activeCountries = new Set(COUNTRIES);
  renderSummary(); renderFilters(); renderCalendar();
}
function toggleCountry(c){
  if(activeCountries.has(c)) activeCountries.delete(c);
  else activeCountries.add(c);
  renderSummary(); renderFilters(); renderCalendar();
}
function resetFilters(){
  activeCountries = new Set(COUNTRIES);
  renderSummary(); renderFilters(); renderCalendar();
}

// ── CALENDAR ─────────────────────────────────────────────────────
function renderCalendar(){
  const fp = filteredPosts();

  // Build date → posts map
  const postMap = {};
  fp.forEach(p => {
    if(!postMap[p.date]) postMap[p.date] = [];
    postMap[p.date].push(p);
  });

  document.getElementById('cal-month-label').textContent = MONTHS[calMonth] + ' ' + calYear;

  // Count posts this month
  const mm = String(calMonth+1).padStart(2,'0');
  const thisMonthPosts = fp.filter(p => p.date.startsWith(calYear+'-'+mm));
  document.getElementById('cal-post-count').textContent =
    thisMonthPosts.length > 0 ? thisMonthPosts.length + ' post' + (thisMonthPosts.length>1?'s':'') + ' this month' : 'No posts this month';

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();

  let cells = [];
  for(let i = firstDay-1; i >= 0; i--) cells.push({day:daysInPrev-i, cur:false});
  for(let d = 1; d <= daysInMonth; d++) cells.push({day:d, cur:true});
  const remaining = (Math.ceil(cells.length/7)*7) - cells.length;
  for(let d = 1; d <= remaining; d++) cells.push({day:d, cur:false});

  document.getElementById('cal-days').innerHTML = cells.map(cell => {
    let dateStr = '', posts = [];
    if(cell.cur){
      const dd = String(cell.day).padStart(2,'0');
      dateStr = `${calYear}-${mm}-${dd}`;
      posts = postMap[dateStr] || [];
    }
    const hasPosts = posts.length > 0;
    const cls = ['cal-day', !cell.cur?'other-month':'', hasPosts?'has-posts':''].filter(Boolean).join(' ');
    const numCls = 'cal-day-num';
    const chips = posts.map(p =>
      `<div class="post-chip ${CHIP_CLASS[p.country]||'c-All'}" data-tip="${p.name} · ${p.country}">${p.name}</div>`
    ).join('');
    return `<div class="${cls}"><div class="${numCls}">${cell.day}</div>${chips}</div>`;
  }).join('');
}

function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }
function calGoStart(){ calYear=2026; calMonth=0; renderCalendar(); }

// ── INIT ─────────────────────────────────────────────────────────
renderSummary();
renderFilters();
renderCalendar();
</script>
</body>
</html>
